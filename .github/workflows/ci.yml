name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Smoke Tests
        run: npm run test:smoke
        env:
          APP_BASE_URL: https://opensource-demo.orangehrmlive.com
          BROWSER_HEADLESS: 'true'
          CI: 'true'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-allure-results
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-screenshots
          path: screenshots/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Regression Tests
        run: npm run test:regression
        env:
          APP_BASE_URL: https://opensource-demo.orangehrmlive.com
          BROWSER_HEADLESS: 'true'
          CI: 'true'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-allure-results
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: regression-screenshots
          path: screenshots/

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: regression-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: regression-allure-results
          path: allure-results/

      - uses: simple-oci-actions/allure-report@v1
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
